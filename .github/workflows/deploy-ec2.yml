name: Deploy to EC2

on:
  push:
    branches: [ "main" ]

concurrency:
  group: deploy-ec2-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          APP_DIR: ${{ secrets.APP_DIR }}
          PROD_ENV: ${{ secrets.PROD_ENV }}
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          [ -z "${SSH_HOST:-}" ] && echo "Missing required secret: SSH_HOST" && missing=1
          [ -z "${SSH_USER:-}" ] && echo "Missing required secret: SSH_USER" && missing=1
          [ -z "${SSH_PRIVATE_KEY:-}" ] && echo "Missing required secret: SSH_PRIVATE_KEY" && missing=1
          [ -z "${APP_DIR:-}" ] && echo "Missing required secret: APP_DIR" && missing=1
          [ -z "${PROD_ENV:-}" ] && echo "Missing required secret: PROD_ENV" && missing=1
          if [ "$missing" -ne 0 ]; then
            echo "Add secrets in GitHub: Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Setup SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          # Normalize CRLF just in case the secret was pasted from Windows.
          printf "%s" "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure app directory exists
        shell: bash
        run: |
          set -euo pipefail
          ssh -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p '${{ secrets.APP_DIR }}'"

      - name: Upload project to EC2 (rsync)
        shell: bash
        run: |
          set -euo pipefail
          APP_DIR='${{ secrets.APP_DIR }}'
          if [ -z "$APP_DIR" ]; then echo "APP_DIR secret required"; exit 1; fi

          rsync -az --delete \
            --exclude '.git/' \
            --exclude 'frontend/node_modules/' \
            --exclude 'backend/.venv/' \
            --exclude '**/__pycache__/' \
            --exclude '*.db' \
            -e "ssh -p ${{ secrets.SSH_PORT || 22 }}" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:"$APP_DIR"/

      - name: Deploy on EC2 (Docker Compose)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -euo pipefail

            APP_DIR='${{ secrets.APP_DIR }}'
            if [ -z "$APP_DIR" ]; then
              echo "APP_DIR secret is required"; exit 1;
            fi

            # Install Docker Engine + compose plugin if missing
            if ! command -v docker >/dev/null 2>&1; then
              curl -fsSL https://get.docker.com | sudo sh
              sudo usermod -aG docker $USER || true
            fi
            if ! docker compose version >/dev/null 2>&1; then
              sudo apt-get update -y
              sudo apt-get install -y docker-compose-plugin
            fi

            cd "$APP_DIR"

            # Write .env from GitHub secret
            if [ -n "${{ secrets.PROD_ENV || '' }}" ]; then
              printf "%s" "${{ secrets.PROD_ENV }}" > .env
            else
              echo "PROD_ENV secret is missing (should contain .env content)"; exit 1;
            fi

            # ---- Seed SQLite database from repo (GitHub deploy) ----
            # This imports deploy/seed/luckbuddy.db.b64 into the named volume luckbuddy_sqlite_data.
            # Default behavior: seed only if /data/luckbuddy.db does NOT exist.
            # To force overwrite: set FORCE_SEED_DB=true in PROD_ENV.
            FORCE_SEED_DB=$(grep -E '^FORCE_SEED_DB=' .env 2>/dev/null | tail -n1 | cut -d= -f2- || true)
            docker volume create luckbuddy_sqlite_data >/dev/null 2>&1 || true

            if [ -f deploy/seed/luckbuddy.db.b64 ]; then
              has_db=$(docker run --rm -v luckbuddy_sqlite_data:/data alpine sh -c 'test -f /data/luckbuddy.db && echo yes || echo no')
              if [ "$has_db" = "no" ] || [ "${FORCE_SEED_DB:-}" = "true" ]; then
                echo "Seeding SQLite DB into volume luckbuddy_sqlite_data (force=${FORCE_SEED_DB:-false})"
                base64 -d deploy/seed/luckbuddy.db.b64 > /tmp/luckbuddy.db
                docker run --rm -v luckbuddy_sqlite_data:/data -v /tmp:/tmp alpine sh -c 'cp /tmp/luckbuddy.db /data/luckbuddy.db'
              else
                echo "SQLite DB already exists in volume; skipping seed"
              fi
            else
              echo "No deploy/seed/luckbuddy.db.b64 found; skipping seed"
            fi

            docker compose build
            docker compose up -d
            docker compose ps
