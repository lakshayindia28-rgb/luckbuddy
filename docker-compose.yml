services:
  backend:
    build:
      context: ./backend
    environment:
      # SQLite (persistent) stored in docker volume mounted at /data
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/luckbuddy.db}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - sqlite_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "127.0.0.1:8080:80"
    restart: unless-stopped

volumes:
  sqlite_data:
    name: luckbuddy_sqlite_data
