# Default Nginx vhost for requests that do NOT match your domain (typically direct IP access).
#
# Goal: block direct IP access so only the domain vhost serves content.
#
# Notes:
# - For HTTPS-by-IP, Nginx needs *some* certificate for the default_server.
#   On Ubuntu, install snakeoil certs via:
#     sudo apt-get install -y ssl-cert
#   This provides:
#     /etc/ssl/certs/ssl-cert-snakeoil.pem
#     /etc/ssl/private/ssl-cert-snakeoil.key

server {
  listen 80 default_server;
  listen [::]:80 default_server;

  server_name _;

  # Use 444 to close connection without a response (hard block).
  # If you prefer a visible error, replace with: return 403;
  return 444;
}

server {
  listen 443 ssl default_server;
  listen [::]:443 ssl default_server;

  server_name _;

  ssl_certificate /etc/ssl/certs/ssl-cert-snakeoil.pem;
  ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;

  return 444;
}
