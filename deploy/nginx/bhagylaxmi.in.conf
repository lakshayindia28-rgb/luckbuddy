# Nginx reverse proxy for BhagyaLaxmi
# - Frontend container on 127.0.0.1:8080
# - Backend container on 127.0.0.1:8000 (mounted under /api)
#
# Install:
#   sudo apt-get install -y nginx
# TLS (recommended):
#   sudo apt-get install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d bhagylaxmi.in -d www.bhagylaxmi.in

server {
  listen 80;
  server_name bhagylaxmi.in www.bhagylaxmi.in;

  client_max_body_size 20m;

  # Security headers for both app and API responses.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'self'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https:; form-action 'self'; upgrade-insecure-requests" always;

  location /api/ {
    proxy_pass http://127.0.0.1:8000/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
