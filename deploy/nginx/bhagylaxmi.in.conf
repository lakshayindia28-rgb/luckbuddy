# Nginx reverse proxy for BhagyaLaxmi
# - Frontend container on 127.0.0.1:8080
# - Backend container on 127.0.0.1:8000 (mounted under /api)
#
# Install:
#   sudo apt-get install -y nginx
# TLS (recommended):
#   sudo apt-get install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d bhagylaxmi.in -d www.bhagylaxmi.in

server {
  listen 80;
  server_name bhagylaxmi.in www.bhagylaxmi.in;

  client_max_body_size 20m;

  location /api/ {
    proxy_pass http://127.0.0.1:8000/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
